# ============================================================
# ÉVÉNEMENTS DE RÉCONCILIATION
# ============================================================
events:
  # Audiovisuel public : basculement CAS → BG en 2025
  - type: move
    year: 2025
    description: "L'audiovisuel public passe de CAS (mission ZD) à BG (mission AQ)"
    sources:
      - { code: 841, label: "France Télévisions (CAS)" }
      - { code: 842, label: "ARTE France (CAS)" }
      - { code: 843, label: "Radio France (CAS)" }
      - { code: 844, label: "France Médias Monde (CAS)" }
      - { code: 845, label: "INA (CAS)" }
    targets:
      - { code: 372, canonical_id: "PGM:audiovisuel-france-televisions" }
      - { code: 373, canonical_id: "PGM:audiovisuel-arte" }
      - { code: 374, canonical_id: "PGM:audiovisuel-radio-france" }
      - { code: 375, canonical_id: "PGM:audiovisuel-france-medias-monde" }
      - { code: 376, canonical_id: "PGM:audiovisuel-ina" }

  # Gestion des FP scindée en 2015-2018
  - type: split
    year: 2018
    description: "Mission Gestion des finances publiques et des ressources humaines scindée"
    source:
      mission_code_old: GA  # Ancien périmètre élargi
    targets:
      - { mission_code: GA, label: "Gestion des finances publiques" }
      - { mission_code: TR, label: "Transformation et fonction publiques" }

  # Programmes renommés (même code, libellé différent)
  - type: rename
    code: 149
    year: 2015
    old_label: "Forêt"
    new_label: "Compétitivité et durabilité de l'agriculture, de l'agroalimentaire et de la forêt"

  - type: rename
    code: 177
    year: 2016
    old_label: "Prévention de l'exclusion et insertion des personnes vulnérables"
    new_label: "Hébergement, parcours vers le logement et insertion des personnes vulnérables"

  - type: rename
    code: 224
    year: 2020
    old_label: "Transmission des savoirs et démocratisation de la culture"
    new_label: "Soutien aux politiques du ministère de la culture"

  - type: rename
    code: 304
    year: 2017
    old_label: "Lutte contre la pauvreté : revenu de solidarité active et expérimentations sociales"

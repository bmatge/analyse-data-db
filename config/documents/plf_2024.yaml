# Configuration de scan des documents PDF du PLF 2024
# 217 PDF + 665 HTML — seuls les PDF sont indexés

annee: 2024
exercice: PLF
type_document: PAP
root_path: "2024"

patterns:
  mission:
    path_pattern: "{type_budget}/MSN/{mission_code}/"
    filename_patterns:
      - "FR_{annee}_PLF_{budget_prefix}_MSN_{mission_code}.pdf"

  programme:
    path_pattern: "{type_budget}/PGM/{programme_code}/"
    filename_patterns:
      - "FR_{annee}_PLF_{mission_code}_PGM_{programme_code}.pdf"

  special:
    - type_budget: CCO
      path: "CCO/CCO/"
      filename: "FR_2024_PLF_CCO.pdf"
      mission_code: null
      programme_code: null
    - type_budget: COM
      path: "COM/COM/"
      filename: "FR_2024_PLF_COM.pdf"
      mission_code: null
      programme_code: null

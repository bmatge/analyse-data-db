<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corpus documentaire – Budget Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.12/dist/dsfr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.12/dist/utility/utility.min.css">
<link rel="stylesheet" href="/static/style.css">
<style>
  .budget-section { margin-bottom: 1.5rem; }

  .budget-header {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.8rem 1rem; background: white;
    border: 1px solid var(--border-default-grey);
    border-radius: 8px 8px 0 0;
    cursor: pointer; user-select: none; transition: background 0.12s;
  }
  .budget-header:hover { background: var(--background-alt-grey); }
  .budget-header .arrow { font-size: 0.7rem; color: var(--text-mention-grey); transition: transform 0.2s; width: 1rem; text-align: center; }
  .budget-header.open .arrow { transform: rotate(90deg); }
  .budget-header .bt-name { font-weight: 700; font-size: 1rem; }
  .budget-header .bt-count { margin-left: auto; font-size: 0.82rem; color: var(--text-mention-grey); }

  .budget-body {
    display: none; border: 1px solid var(--border-default-grey); border-top: none;
    border-radius: 0 0 8px 8px; background: white;
  }
  .budget-body.open { display: block; }

  .mission-row { border-bottom: 1px solid var(--border-default-grey); }
  .mission-row:last-child { border-bottom: none; }

  .corpus .mission-header {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1rem 0.6rem 1.5rem;
    cursor: pointer; user-select: none; transition: background 0.1s;
  }
  .corpus .mission-header:hover { background: var(--background-alt-grey); }
  .corpus .mission-header .arrow { font-size: 0.65rem; color: var(--text-mention-grey); transition: transform 0.2s; width: 0.8rem; text-align: center; }
  .corpus .mission-header.open .arrow { transform: rotate(90deg); }
  .corpus .mission-header .msn-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
  .corpus .mission-header .msn-count { font-size: 0.78rem; color: var(--text-mention-grey); white-space: nowrap; }

  .pdf-link {
    font-size: 0.75rem; color: #18753c; text-decoration: none;
    padding: 0.2rem 0.5rem; border-radius: 4px;
    background: #b8fec9; white-space: nowrap; font-weight: 500;
    transition: all 0.12s;
  }
  .pdf-link:hover { background: #7fd69e; color: #0a3517; }

  .pgm-list { display: none; padding: 0.25rem 1rem 0.75rem 2.8rem; }
  .pgm-list.open { display: block; }

  .pgm-item {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.35rem 0.75rem; font-size: 0.85rem;
    border-left: 2px solid var(--border-default-grey);
    margin-left: 0.2rem; border-radius: 0 4px 4px 0;
    transition: background 0.1s;
  }
  .pgm-item:hover { background: var(--background-alt-grey); }

  .pgm-item .pgm-num {
    font-family: 'Fira Code', 'SF Mono', monospace;
    font-weight: 700; font-size: 0.82rem;
    color: #006a62; min-width: 2.5rem;
  }

  .pgm-item a {
    color: var(--text-default-grey); text-decoration: none;
    font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;
  }
  .pgm-item a:hover { color: #000091; }

  .pgm-item .pdf-icon { color: #18753c; font-size: 0.82rem; }

  .search-box {
    display: flex; gap: 0.5rem; margin-bottom: 1.25rem; align-items: center;
    padding: 0.5rem 0.75rem; background: var(--background-alt-grey);
    border-radius: 8px; border: 1px solid var(--border-default-grey);
  }
  .search-box input {
    flex: 1; padding: 0.45rem 0.75rem;
    border: 1px solid var(--border-default-grey);
    border-radius: 4px; font-size: 0.88rem;
    background: white; outline: none;
  }
  .search-box input:focus { outline: 2px solid #000091; outline-offset: 1px; border-color: transparent; }
  .search-box input::placeholder { color: var(--text-mention-grey); }
  .search-box .result-count { font-size: 0.8rem; color: var(--text-mention-grey); white-space: nowrap; }

  .btn-expand {
    padding: 0.35rem 0.75rem; font-size: 0.8rem;
    border: 1px solid var(--border-default-grey);
    border-radius: 4px; background: white;
    cursor: pointer; color: var(--text-mention-grey);
    font-weight: 500; transition: all 0.12s;
  }
  .btn-expand:hover { background: var(--background-alt-grey); color: var(--text-default-grey); }

  .highlight { background: #fef08a; border-radius: 2px; padding: 0 2px; }

  @media (max-width: 700px) {
    .corpus .mission-header { padding-left: 1rem; }
    .pgm-list { padding-left: 1.8rem; }
  }
</style>
</head>
<body>

<header role="banner" class="fr-header">
  <div class="fr-header__body">
    <div class="fr-container">
      <div class="fr-header__body-row">
        <div class="fr-header__brand fr-enlarge-link">
          <div class="fr-header__brand-top">
            <div class="fr-header__logo">
              <p class="fr-logo">Republique<br>Francaise</p>
            </div>
            <div class="fr-header__navbar">
              <button class="fr-btn--menu fr-btn" data-fr-opened="false" aria-controls="header-navigation" aria-haspopup="menu" id="burger-btn" title="Menu">Menu</button>
            </div>
          </div>
          <div class="fr-header__service">
            <a href="/" title="Accueil - Budget Explorer">
              <p class="fr-header__service-title">Budget Explorer</p>
            </a>
            <p class="fr-header__service-tagline">Direction du Budget</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="fr-header__menu fr-modal" id="header-navigation" aria-labelledby="burger-btn">
    <div class="fr-container">
      <button class="fr-btn--close fr-btn" aria-controls="header-navigation" title="Fermer">Fermer</button>
      <div class="fr-header__menu-links"></div>
      <nav class="fr-nav" role="navigation" aria-label="Menu principal">
        <ul class="fr-nav__list">
          <li class="fr-nav__item"><a class="fr-nav__link" href="/">Accueil</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/glossaire">Glossaire</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/api-specs">Interfaces</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/nomenclature">Nomenclature</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/corpus" aria-current="page">Corpus documentaire</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/plf-lfi">Flux PLF / LFI</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/prototypes">Prototypes</a></li>
          <li class="fr-nav__item"><a class="fr-nav__link" href="/analyse-existant">Analyse existant</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<main class="budget-main corpus"><div class="fr-container">
<h1 class="fr-h3 fr-mb-1w" id="corpus-title">Corpus documentaire</h1>
<p class="fr-text--sm fr-mb-2w" style="color:var(--text-mention-grey)" id="corpus-subtitle">Chargement...</p>

<div style="display:flex;gap:0.5rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap">
  <label class="fr-label" style="margin:0;font-size:0.85rem">Annee :</label>
  <select id="sel-annee" class="fr-select" style="width:auto;padding:0.3rem 0.6rem;font-size:0.85rem"></select>
  <label class="fr-label" style="margin:0 0 0 0.5rem;font-size:0.85rem">Exercice :</label>
  <select id="sel-exercice" class="fr-select" style="width:auto;padding:0.3rem 0.6rem;font-size:0.85rem"></select>
</div>

<div class="stat-grid" id="stats"></div>

<div class="search-box">
  <input type="search" id="search" placeholder="Mission, programme, code..." autocomplete="off">
  <span class="result-count" id="result-count"></span>
  <button class="btn-expand" id="btn-expand-all" title="Deployer toute l'arborescence">Tout ouvrir</button>
  <button class="btn-expand" id="btn-collapse-all" title="Replier toute l'arborescence">Tout fermer</button>
</div>

<div id="corpus-tree"></div>
</div></main>

<script>
let FILE_BASE = '';
let DATA = {};

const BUDGET_TYPES = {
  BG:  { label: 'Budget general' },
  BA:  { label: 'Budgets annexes' },
  CAS: { label: "Comptes d'affectation speciale" },
  CCF: { label: 'Comptes de concours financiers' },
  CCO: { label: 'Comptes de commerce' },
  COM: { label: "Comptes d'operations monetaires" }
};

const BT_ORDER = ['BG', 'BA', 'CAS', 'CCF', 'CCO', 'COM'];
const EXERCICE_LABELS = { PLF: 'PLF (Projet)', PLR: 'PLRG (Resultats)' };

// ── Init: load years then corpus ──
async function init() {
  const years = await (await fetch('/api/annees')).json();
  const selAnnee = document.getElementById('sel-annee');
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = y;
    o.textContent = y;
    selAnnee.appendChild(o);
  });
  selAnnee.value = years[years.length - 1];

  selAnnee.addEventListener('change', () => loadExercices(selAnnee.value));
  document.getElementById('sel-exercice').addEventListener('change', () => {
    loadCorpus(selAnnee.value, document.getElementById('sel-exercice').value);
  });

  await loadExercices(selAnnee.value);
}

async function loadExercices(annee) {
  const data = await (await fetch(`/api/corpus/${annee}`)).json();
  const selEx = document.getElementById('sel-exercice');
  selEx.innerHTML = '';
  data.exercices_disponibles.forEach(ex => {
    const o = document.createElement('option');
    o.value = ex;
    o.textContent = EXERCICE_LABELS[ex] || ex;
    selEx.appendChild(o);
  });
  selEx.value = data.exercice;
  applyCorpusData(data);
}

async function loadCorpus(annee, exercice) {
  const data = await (await fetch(`/api/corpus/${annee}?exercice=${exercice}`)).json();
  applyCorpusData(data);
}

function applyCorpusData(data) {
  FILE_BASE = data.file_base;
  DATA = data.tree;

  const exLabel = data.exercice === 'PLR' ? 'PLRG' : data.exercice;
  document.getElementById('corpus-title').textContent = `Corpus documentaire ${exLabel} ${data.annee}`;
  document.title = `Corpus ${exLabel} ${data.annee} – Budget Explorer`;

  // Count docs
  let totalMissions = 0, totalProgrammes = 0, totalFiles = 0;
  const activeBTs = BT_ORDER.filter(bt => DATA[bt]);
  for (const bt of activeBTs) {
    const missions = Object.keys(DATA[bt].missions);
    totalMissions += missions.length;
    for (const m of missions) {
      if (DATA[bt].missions[m].msn_path) totalFiles++;
      totalProgrammes += DATA[bt].missions[m].programmes.length;
      totalFiles += DATA[bt].missions[m].programmes.length;
    }
  }

  document.getElementById('corpus-subtitle').textContent =
    `Documents ${exLabel} ${data.annee} — ${totalFiles} PDF indexes par mission et programme`;

  updateStats(activeBTs.length, totalMissions, totalProgrammes, totalFiles);
  buildTree();
  bindSearch();
  bindExpandCollapse();
}

function updateStats(nbt, nmsn, npgm, nfiles) {
  document.getElementById('stats').innerHTML = [
    { label: 'Types de budget', value: nbt, mod: 'accent' },
    { label: 'Missions', value: nmsn, mod: 'info' },
    { label: 'Programmes', value: npgm, mod: 'info' },
    { label: 'Documents PDF', value: nfiles, mod: 'success' }
  ].map(s => `<div class="fr-tile stat-tile stat-tile--${s.mod}"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div></div>`).join('');
}

// ── Build tree from DATA ──
function buildTree() {
  const container = document.getElementById('corpus-tree');
  container.innerHTML = '';

  const activeBTs = BT_ORDER.filter(bt => DATA[bt]);

  for (const bt of activeBTs) {
    const info = BUDGET_TYPES[bt];
    const missions = DATA[bt].missions;
    const msnKeys = Object.keys(missions);
    const pgmCount = msnKeys.reduce((s, k) => s + missions[k].programmes.length, 0);

    const section = document.createElement('div');
    section.className = 'budget-section';
    section.dataset.bt = bt;

    // Budget header
    const bh = document.createElement('div');
    bh.className = 'budget-header';
    bh.innerHTML = `<span class="arrow">&#9654;</span><span class="fr-badge fr-badge--sm fr-badge--${bt.toLowerCase()}">${bt}</span><span class="bt-name">${info.label}</span><span class="bt-count">${msnKeys.length} mission${msnKeys.length > 1 ? 's' : ''} &middot; ${pgmCount} programme${pgmCount > 1 ? 's' : ''}</span>`;
    bh.addEventListener('click', () => {
      bh.classList.toggle('open');
      body.classList.toggle('open');
    });
    section.appendChild(bh);

    // Budget body
    const body = document.createElement('div');
    body.className = 'budget-body';

    for (const code of msnKeys) {
      const msn = missions[code];
      const row = document.createElement('div');
      row.className = 'mission-row';
      row.dataset.code = code;
      row.dataset.name = msn.name.toLowerCase();

      // Mission header
      const mh = document.createElement('div');
      mh.className = 'mission-header';
      const hasPgm = msn.programmes.length > 0;
      mh.innerHTML = `
        ${hasPgm ? '<span class="arrow">&#9654;</span>' : '<span style="width:0.8rem;display:inline-block"></span>'}
        <span class="fr-badge fr-badge--sm fr-badge--msn">${code}</span>
        <span class="msn-name">${msn.name}</span>
        <a href="${FILE_BASE}${msn.msn_path}" target="_blank" class="pdf-link" title="Telecharger le PAP de la mission ${msn.name}">&#128196; PAP Mission</a>
        ${hasPgm ? `<span class="msn-count">${msn.programmes.length} programme${msn.programmes.length > 1 ? 's' : ''}</span>` : ''}
      `;
      row.appendChild(mh);

      // Programme list
      if (hasPgm) {
        const pgmList = document.createElement('div');
        pgmList.className = 'pgm-list';
        for (const pgm of msn.programmes) {
          const item = document.createElement('div');
          item.className = 'pgm-item';
          item.dataset.num = pgm.num;
          item.innerHTML = `
            <span class="pgm-num">${pgm.num}</span>
            <a href="${FILE_BASE}${pgm.path}" target="_blank" title="PAP Programme ${pgm.num}">
              <span class="pdf-icon">&#128196;</span> Programme ${pgm.num}
            </a>
          `;
          pgmList.appendChild(item);
        }
        row.appendChild(pgmList);

        mh.addEventListener('click', (e) => {
          if (e.target.closest('.pdf-link')) return;
          mh.classList.toggle('open');
          pgmList.classList.toggle('open');
        });
      }

      body.appendChild(row);
    }

    section.appendChild(body);
    container.appendChild(section);
  }
}

// ── Search ──
function bindSearch() {
  const searchInput = document.getElementById('search');
  const resultCount = document.getElementById('result-count');

  // Remove old listener by cloning
  const newInput = searchInput.cloneNode(true);
  searchInput.parentNode.replaceChild(newInput, searchInput);
  newInput.value = '';

  newInput.addEventListener('input', () => {
    const q = newInput.value.trim().toLowerCase();
    let visible = 0;

    document.querySelectorAll('.budget-section').forEach(section => {
      let sectionHasMatch = false;
      const body = section.querySelector('.budget-body');
      const header = section.querySelector('.budget-header');

      section.querySelectorAll('.mission-row').forEach(row => {
        const code = row.dataset.code.toLowerCase();
        const name = row.dataset.name;
        const pgmNums = Array.from(row.querySelectorAll('.pgm-item')).map(p => p.dataset.num);
        const match = !q || code.includes(q) || name.includes(q) || pgmNums.some(n => n.includes(q));

        row.style.display = match ? '' : 'none';
        if (match) {
          sectionHasMatch = true;
          visible++;
        }
      });

      section.style.display = sectionHasMatch || !q ? '' : 'none';

      if (q && sectionHasMatch) {
        header.classList.add('open');
        body.classList.add('open');
      }
    });

    resultCount.textContent = q ? `${visible} mission${visible > 1 ? 's' : ''}` : '';
  });
}

// ── Expand / Collapse all ──
function bindExpandCollapse() {
  const btnExpand = document.getElementById('btn-expand-all');
  const btnCollapse = document.getElementById('btn-collapse-all');

  // Clone to remove old listeners
  const newExpand = btnExpand.cloneNode(true);
  btnExpand.parentNode.replaceChild(newExpand, btnExpand);
  const newCollapse = btnCollapse.cloneNode(true);
  btnCollapse.parentNode.replaceChild(newCollapse, btnCollapse);

  newExpand.addEventListener('click', () => {
    document.querySelectorAll('.budget-header').forEach(h => h.classList.add('open'));
    document.querySelectorAll('.budget-body').forEach(b => b.classList.add('open'));
    document.querySelectorAll('.mission-header').forEach(h => {
      if (h.parentElement.querySelector('.pgm-list')) h.classList.add('open');
    });
    document.querySelectorAll('.pgm-list').forEach(l => l.classList.add('open'));
  });

  newCollapse.addEventListener('click', () => {
    document.querySelectorAll('.budget-header').forEach(h => h.classList.remove('open'));
    document.querySelectorAll('.budget-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.mission-header').forEach(h => h.classList.remove('open'));
    document.querySelectorAll('.pgm-list').forEach(l => l.classList.remove('open'));
  });
}

// ── Start ──
init();
</script>

<script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.12/dist/dsfr.module.min.js" type="module"></script>
</body>
</html>

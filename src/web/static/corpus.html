<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corpus PLF 2025 – Budget Explorer</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .corpus-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .budget-section {
    margin-bottom: 2rem;
  }

  .budget-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: var(--shadow);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
  }
  .budget-header:hover { background: #f8fafc; }

  .budget-header .arrow {
    font-size: 0.7rem;
    color: var(--muted);
    transition: transform 0.2s;
    width: 1rem;
    text-align: center;
  }
  .budget-header.open .arrow { transform: rotate(90deg); }

  .budget-header .bt-name {
    font-weight: 700;
    font-size: 1rem;
  }
  .budget-header .bt-count {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .budget-body {
    display: none;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--card);
    box-shadow: var(--shadow);
  }
  .budget-body.open { display: block; }

  .mission-row {
    border-bottom: 1px solid var(--border);
  }
  .mission-row:last-child { border-bottom: none; }

  .mission-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1rem 0.6rem 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .mission-header:hover { background: #f8fafc; }

  .mission-header .arrow {
    font-size: 0.65rem;
    color: var(--muted);
    transition: transform 0.2s;
    width: 0.8rem;
    text-align: center;
  }
  .mission-header.open .arrow { transform: rotate(90deg); }

  .mission-header .msn-name {
    font-weight: 600;
    font-size: 0.9rem;
  }

  .mission-header .msn-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .mission-header .pdf-link {
    font-size: 0.75rem;
    color: var(--doc);
    text-decoration: none;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    background: var(--doc-light);
    white-space: nowrap;
  }
  .mission-header .pdf-link:hover {
    text-decoration: underline;
  }

  .pgm-list {
    display: none;
    padding: 0 1rem 0.5rem 2.8rem;
  }
  .pgm-list.open { display: block; }

  .pgm-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
    font-size: 0.85rem;
    border-left: 2px solid var(--border);
    padding-left: 1rem;
    margin-left: 0.2rem;
  }

  .pgm-item .pgm-num {
    font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--accent);
    min-width: 2.5rem;
  }

  .pgm-item a {
    color: var(--text);
    text-decoration: none;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .pgm-item a:hover { color: var(--accent); }

  .pgm-item .pdf-icon {
    color: var(--doc);
    font-size: 0.75rem;
  }

  .search-box {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .result-count {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .btn-expand {
    padding: 0.35rem 0.7rem;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    cursor: pointer;
    color: var(--muted);
    transition: all 0.12s;
  }
  .btn-expand:hover { background: var(--bg); color: var(--text); }

  .highlight { background: #fef08a; border-radius: 2px; padding: 0 1px; }

  @media (max-width: 700px) {
    .mission-header { padding-left: 1rem; }
    .pgm-list { padding-left: 1.8rem; }
  }
</style>
</head>

// Compute stats
let totalMissions = 0, totalProgrammes = 0, totalFiles = 0;
const btOrder = ['BG', 'BA', 'CAS', 'CCF', 'CCO', 'COM'];
for (const bt of btOrder) {
  const missions = Object.keys(DATA[bt].missions);
  totalMissions += missions.length;
  for (const m of missions) {
    totalFiles++; // mission file
    totalProgrammes += DATA[bt].missions[m].programmes.length;
    totalFiles += DATA[bt].missions[m].programmes.length;
  }
}

document.getElementById('stats').innerHTML = [
  { label: 'Budgets', value: btOrder.length, cls: '' },
  { label: 'Missions', value: totalMissions, cls: 'accent' },
  { label: 'Programmes', value: totalProgrammes, cls: 'accent' },
  { label: 'Documents PDF', value: totalFiles, cls: 'fin' }
].map(s => `<div class="stat-card"><div class="label">${s.label}</div><div class="value ${s.cls}">${s.value}</div></div>`).join('');

// Build tree
function buildTree() {
  const container = document.getElementById('corpus-tree');
  container.innerHTML = '';

  for (const bt of btOrder) {
    const info = BUDGET_TYPES[bt];
    const missions = DATA[bt].missions;
    const msnKeys = Object.keys(missions);
    const pgmCount = msnKeys.reduce((s, k) => s + missions[k].programmes.length, 0);

    const section = document.createElement('div');
    section.className = 'budget-section';
    section.dataset.bt = bt;

    // Budget header
    const bh = document.createElement('div');
    bh.className = 'budget-header';
    bh.innerHTML = `<span class="arrow">&#9654;</span><span class="badge ${info.badge}">${bt}</span><span class="bt-name">${info.label}</span><span class="bt-count">${msnKeys.length} mission${msnKeys.length > 1 ? 's' : ''} &middot; ${pgmCount} programme${pgmCount > 1 ? 's' : ''}</span>`;
    bh.addEventListener('click', () => {
      bh.classList.toggle('open');
      body.classList.toggle('open');
    });
    section.appendChild(bh);

    // Budget body
    const body = document.createElement('div');
    body.className = 'budget-body';

    for (const code of msnKeys) {
      const msn = missions[code];
      const row = document.createElement('div');
      row.className = 'mission-row';
      row.dataset.code = code;
      row.dataset.name = msn.name.toLowerCase();

      // Mission header
      const mh = document.createElement('div');
      mh.className = 'mission-header';
      const hasPgm = msn.programmes.length > 0;
      mh.innerHTML = `
        ${hasPgm ? '<span class="arrow">&#9654;</span>' : '<span style="width:0.8rem;display:inline-block"></span>'}
        <span class="badge badge-dest">${code}</span>
        <span class="msn-name">${msn.name}</span>
        <a href="${FILE_BASE}${msn.msn_path}" target="_blank" class="pdf-link" title="PAP Mission">PAP Mission</a>
        ${hasPgm ? `<span class="msn-count">${msn.programmes.length} pgm</span>` : ''}
      `;

      if (hasPgm) {
        mh.addEventListener('click', (e) => {
          if (e.target.closest('.pdf-link')) return;
          mh.classList.toggle('open');
          pgmList.classList.toggle('open');
        });
      }
      row.appendChild(mh);

      // Programme list
      if (hasPgm) {
        const pgmList = document.createElement('div');
        pgmList.className = 'pgm-list';
        for (const pgm of msn.programmes) {
          const item = document.createElement('div');
          item.className = 'pgm-item';
          item.dataset.num = pgm.num;
          item.innerHTML = `
            <span class="pgm-num">${pgm.num}</span>
            <a href="${FILE_BASE}${pgm.path}" target="_blank">
              <span class="pdf-icon">&#128196;</span> Programme ${pgm.num}
            </a>
          `;
          pgmList.appendChild(item);
        }
        row.appendChild(pgmList);
        // re-bind pgmList reference for the click handler
        mh.addEventListener('click', (e) => {
          if (e.target.closest('.pdf-link')) return;
        });
      }
      body.appendChild(row);
    }

    section.appendChild(body);
    container.appendChild(section);
  }
}

buildTree();

// Fix: pgmList reference in event handler
// Rebind properly by using DOM traversal
document.querySelectorAll('.mission-header').forEach(mh => {
  const row = mh.parentElement;
  const pgmList = row.querySelector('.pgm-list');
  if (!pgmList) return;

  // Remove old listeners by replacing node
  const newMh = mh.cloneNode(true);
  mh.parentNode.replaceChild(newMh, mh);

  newMh.addEventListener('click', (e) => {
    if (e.target.closest('.pdf-link')) return;
    newMh.classList.toggle('open');
    pgmList.classList.toggle('open');
  });
});

// Search
const searchInput = document.getElementById('search');
const resultCount = document.getElementById('result-count');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let visible = 0;

  document.querySelectorAll('.budget-section').forEach(section => {
    let sectionHasMatch = false;
    const body = section.querySelector('.budget-body');
    const header = section.querySelector('.budget-header');

    section.querySelectorAll('.mission-row').forEach(row => {
      const code = row.dataset.code.toLowerCase();
      const name = row.dataset.name;
      const pgmNums = Array.from(row.querySelectorAll('.pgm-item')).map(p => p.dataset.num);
      const match = !q || code.includes(q) || name.includes(q) || pgmNums.some(n => n.includes(q));

      row.style.display = match ? '' : 'none';
      if (match) {
        sectionHasMatch = true;
        visible++;
      }
    });

    section.style.display = sectionHasMatch || !q ? '' : 'none';

    if (q && sectionHasMatch) {
      header.classList.add('open');
      body.classList.add('open');
    }
  });

  resultCount.textContent = q ? `${visible} mission${visible > 1 ? 's' : ''}` : '';
});

// Expand / Collapse all
document.getElementById('btn-expand-all').addEventListener('click', () => {
  document.querySelectorAll('.budget-header').forEach(h => h.classList.add('open'));
  document.querySelectorAll('.budget-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.mission-header').forEach(h => {
    if (h.parentElement.querySelector('.pgm-list')) h.classList.add('open');
  });
  document.querySelectorAll('.pgm-list').forEach(l => l.classList.add('open'));
});

document.getElementById('btn-collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.budget-header').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.budget-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.mission-header').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.pgm-list').forEach(l => l.classList.remove('open'));
});
</script>
